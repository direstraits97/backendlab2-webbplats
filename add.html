<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/sass/main.scss">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Petit+Formal+Script&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <title>Mitt CV | Startsida</title>
  </head>
  <body>
    <header>
      <div id="topheader">
        <img id="logo" src="/bilder/tslab2logo.svg" alt="">
        <h1 id="bigscreenheading">Mitt CV</h1>
        <button
          id="openmenu"
          aria-label="Öppna meny"
          aria-expanded="false"
          aria-controls="navbar"
        >
          <img src="/ikoner/openmenu.svg" alt="">
        </button>
      </div>
      <nav id="navbar">
        <ul>
          <li id="menuchoice">
            <button id="closemenu" aria-label="Stäng meny">
              <img src="/ikoner/closemenu.svg" alt="">
            </button>
          </li>
          <li><a href="/index.html">Startsidan</a></li>
          <li><a href="/add.html">Lägg till</a></li>
          <li><a href="/about.html">Om sidan</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <h1 id="smallscreenheading">Mitt CV</h1>
      <section>
        <h2>Lägg till ny arbetslivserfarenhet</h2>
        <form id="addexperienceform">
          <div id="errorcontainer"></div>
          <label for="company">Arbetsgivare:</label>
          <input type="text" id="company" name="company">
          <label for="title">Yrkesroll:</label>
          <input type="text" id="title" name="title">
          <label for="location">Stad:</label>
          <input type="text" id="location" name="location">
          <label for="startdate">Startdatum:</label>
          <input type="date" id="startdate" name="startdate">
          <label for="enddate">Slutdatum:</label>
          <input type="date" id="enddate" name="enddate">
          <label for="description">Beskrivning:</label>
          <textarea id="description"></textarea>
          <button id="addform">
            Lägg till
            <img src="/ikoner/add.svg" alt="">
          </button>
          <div id="confirmcontainer"></div>
        </form>
      </section>
    </main>
    <footer>
      <p>JOBA1602</p>
      <p>Backend-baserad webbutveckling</p>
      <p>DT207G</p>
    </footer>
    <script type="module" src="/src/js/addexperience.js"></script>
    <script type="module" src="/src/js/hamburger.js"></script>
  </body>
</html>
